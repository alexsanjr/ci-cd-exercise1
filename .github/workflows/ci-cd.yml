name: CI-CD

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build --if-present

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm run test:unit --if-present

      - name: Integration tests
        run: npm run test:integration --if-present

      - name: SonarQube/SonarCloud
        if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' && secrets.SONAR_PROJECT_KEY != '' }}
        uses: SonarSource/sonarqube-scan-action@v4
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SAST (Semgrep)
        uses: returntocorp/semgrep-action@v1
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: SAST (Semgrep OSS fallback)
        if: ${{ secrets.SEMGREP_APP_TOKEN == '' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install semgrep
          semgrep --version
          # Regras prontas do Semgrep Registry
          semgrep --config=p/ci --error

  container:
    name: Container
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Lint (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: local/${{ github.event.repository.name }}:ci

      - name: Scan vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: local/${{ github.event.repository.name }}:ci
          format: table
          exit-code: 0

      - name: Login to DockerHub
        if: ${{ github.ref == 'refs/heads/main' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        if: ${{ github.ref == 'refs/heads/main' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  deploy_staging:
    name: CD (Homologação)
    runs-on: ubuntu-latest
    needs: container
    if: ${{ github.ref == 'refs/heads/main' && secrets.RENDER_STAGING_DEPLOY_HOOK != '' }}

    steps:
      - name: Trigger Render deploy (staging)
        run: curl -fsSL -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}"

  dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: deploy_staging
    if: ${{ secrets.STAGING_URL != '' }}

    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ secrets.STAGING_URL }}
          fail_action: false

  approval:
    name: Aprovação Manual
    runs-on: ubuntu-latest
    needs: dast
    if: ${{ github.ref == 'refs/heads/main' }}
    environment: production

    steps:
      - name: Await approval
        run: echo "Aguardando aprovação do ambiente production."

  deploy_production:
    name: CD (Produção)
    runs-on: ubuntu-latest
    needs: approval
    if: ${{ github.ref == 'refs/heads/main' && secrets.RENDER_PRODUCTION_DEPLOY_HOOK != '' }}

    steps:
      - name: Trigger Render deploy (production)
        run: curl -fsSL -X POST "${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK }}"
